<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { height:100%; background:#1b2431; overflow:hidden; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Malgun Gothic",sans-serif; }
  #wrap { position:relative; width:100vw; height:100vh; height:100dvh; margin:0 auto; max-width:520px; background:#0d1117; box-shadow:0 0 0 1px #313d4e, 0 0 40px rgba(0,0,0,.6); }
  canvas { display:block; width:100%; height:100%; touch-action:none; }
  #hud { position:absolute; top:0; left:0; right:0; padding:10px 14px; pointer-events:none; color:#e6edf3; z-index:5; }
  #money { position:absolute; top:58px; left:0; right:0; text-align:center; font-size:40px; font-weight:900; letter-spacing:-1px; color:#e6edf3; text-shadow:0 2px 10px rgba(0,0,0,.7); z-index:5; pointer-events:none; transform-origin:center top; transition:transform .1s ease, color .35s ease; }
  #money .won { font-size:20px; opacity:.7; margin-left:3px; }
  #subrow { display:flex; justify-content:space-between; align-items:center; margin-top:4px; font-size:13px; font-weight:600; }
  #title-badge { position:absolute; top:110px; left:0; right:0; text-align:center; font-size:20px; font-weight:800; color:#ff8c42; text-shadow:0 0 12px rgba(255,140,66,.55), 0 1px 4px #000; z-index:5; pointer-events:none; }
  #timeLabel { position:absolute; top:12px; left:0; right:0; text-align:center; font-size:24px; font-weight:800; color:#e6edf3; text-shadow:0 2px 8px rgba(0,0,0,.7); z-index:5; pointer-events:none; }
  #timebar-bg { position:absolute; top:46px; left:14px; right:14px; height:6px; background:#21262d; border-radius:4px; overflow:hidden; }
  #timebar { height:100%; width:100%; background:linear-gradient(90deg,#3fb950,#f7c948,#f85149); }
  #combo { position:absolute; top:142px; left:0; right:0; text-align:center; font-size:20px; font-weight:900; color:#f7c948; opacity:0; transition:opacity .2s; pointer-events:none; z-index:6; text-shadow:0 2px 8px rgba(0,0,0,.7); }
  #sndBtn { position:absolute; top:10px; right:12px; z-index:9; font-size:20px; cursor:pointer; opacity:.85; user-select:none; }
  #eventBanner { position:absolute; top:32%; left:0; right:0; text-align:center; font-size:50px; font-weight:900; letter-spacing:-1px; color:#7ee787; text-shadow:0 0 26px rgba(63,185,80,1), 0 0 10px rgba(126,231,135,.9), 0 3px 10px #000; opacity:0; z-index:8; pointer-events:none; }
  #eventBanner.show { animation:evt 1.7s ease-out; }
  #newsHeadline { position:absolute; top:41%; left:0; right:0; text-align:center; font-size:21px; font-weight:800; font-style:italic; letter-spacing:-0.5px; padding:0 24px; opacity:0; z-index:8; pointer-events:none; text-shadow:0 2px 8px #000, 0 0 4px #000; }
  #newsHeadline.show { animation:nhl 2.8s ease-out; }
  @keyframes nhl { 0%{opacity:0; transform:translateY(10px);} 12%{opacity:1; transform:translateY(0);} 78%{opacity:1;} 100%{opacity:0; transform:translateY(-4px);} }
  @keyframes evt { 0%{opacity:0; transform:scale(.3);} 12%{opacity:1; transform:scale(1.35);} 22%{transform:scale(1.05);} 80%{opacity:1; transform:scale(1.05);} 100%{opacity:0; transform:scale(1.15);} }
  .overlay { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; background:rgba(13,17,23,.92); color:#e6edf3; z-index:20; padding:24px; overflow-y:auto; scrollbar-width:none; -ms-overflow-style:none; }
  .overlay::-webkit-scrollbar { display:none; }
  .hidden { display:none; }
  .overlay h1 { font-size:30px; font-weight:900; margin-bottom:6px; letter-spacing:-1px; }
  .overlay h1 .up { color:#3fb950; } .overlay h1 .down { color:#f85149; }
  .overlay p { font-size:14px; line-height:1.7; color:#9da7b3; margin-bottom:8px; max-width:340px; }
  .btn { margin-top:18px; padding:14px 40px; font-size:18px; font-weight:800; color:#fff; background:linear-gradient(135deg,#2ea043,#3fb950); border:none; border-radius:30px; cursor:pointer; box-shadow:0 6px 20px rgba(63,185,80,.45); }
  .btn:active { transform:scale(.96); }
  #retryBtn { background:linear-gradient(135deg,#2ea043,#3fb950); box-shadow:0 6px 20px rgba(63,185,80,.45); }
  #nameInput { margin:22px 0 10px; width:220px; max-width:70%; padding:12px 16px; font-size:16px; font-weight:700; text-align:center; color:#e6edf3; background:#161b22; border:2px solid #30363d; border-radius:14px; outline:none; }
  #nameInput:focus { border-color:#f7c948; }
  #nameInput::placeholder { color:#6e7681; font-weight:500; }
  .rule { display:flex; gap:20px; margin:14px 0 4px; }
  .rule div { font-size:13px; }
  .swatch { display:inline-block; width:14px; height:22px; border-radius:2px; vertical-align:middle; margin-right:5px; }
  .up-sw { background:#3fb950; } .down-sw { background:#f85149; }
  #resultHead { font-size:22px; }
  #resultScore { font-size:40px; font-weight:900; color:#f7c948; margin:6px 0; white-space:nowrap; }
  #resultTitle { font-size:28px; font-weight:900; margin-bottom:4px; color:#ff8c42; text-shadow:0 0 16px rgba(255,140,66,.6); }
  #resultStats { font-size:18px; font-weight:700; color:#c9d1d9; margin-bottom:6px; }
  .lb { list-style:none; width:100%; max-width:420px; margin-top:8px; text-align:left; }
  .lb li { display:flex; justify-content:space-between; padding:6px 12px; border-radius:8px; font-size:14px; }
  .lb li:nth-child(odd){ background:#161b22; }
  .lb li.me { background:#1f2d1f; color:#7ee787; }
  .lb .rank { width:26px; color:#9da7b3; }
  .lb .name { flex:1; }
  #lbListStart { max-width:380px; margin-top:6px; }
  #lbListStart li { font-size:13px; padding:5px 12px; }
  #lbTitle { font-size:13px; font-weight:700; color:#9da7b3; margin-top:30px; }
  .lbTabs { display:flex; gap:10px; justify-content:center; margin:8px 0 4px; }
  .lbTab { background:#161b22; color:#9da7b3; border:1px solid #30363d; border-radius:16px; padding:6px 34px; font-size:13px; font-weight:800; cursor:pointer; -webkit-tap-highlight-color:transparent; }
  .lbTab.active { background:#1f6feb; color:#fff; border-color:#58a6ff; }

  #startScreen { justify-content:flex-start; padding:0 20px 18px; background:#0b0f16; }
  #introHero { width:100%; max-width:520px; height:55vh; object-fit:cover; object-position:center top; display:block;
    -webkit-mask-image:linear-gradient(to bottom,#000 86%,transparent 100%); mask-image:linear-gradient(to bottom,#000 86%,transparent 100%); }
  #startScreen h1, #startScreen .rule { display:none; }

  var dragFX=null, dragPX=0;
  function pDown(e){
    var t = e.touches ? e.touches[0] : e;

  }
  function pMove(e){

    var rect = cv.getBoundingClientRect();

  window.addEventListener('mouseup', function(){ dragFX=null; });
  window.addEventListener('keydown', function(e){ if(e.key==='ArrowLeft')keys.left=true; if(e.key==='ArrowRight')keys.right=true; });

  function difficulty(){ return 1 - (timeLeft/GAME_TIME); }

  function spawnCandle(){
    var p = difficulty();
    // 뉴스 효과: 떡상=양봉 확률 급상승 / 떡락=음봉 확률 급상승
    var isUp = (newsTimer>0) ? (Math.random() < (newsType==='boom' ? 0.9 : 0.1)) : (Math.random() < (0.53 - p*0.15));
    if(crashTimer>0) isUp=false;   // 폭락장: 음봉만
    var level = 1 + Math.floor(Math.pow(Math.random(), 1.12 - p*0.5)*10);
    level = Math.max(1, Math.min(10, level));
    if(!isUp && ((difficulty()>0.5 && Math.random()<0.16) || (crashTimer>0 && Math.random()<0.55))){ level = (Math.random()<0.5)?12:11; }
    var special = null;
    if(crashTimer>0){ if(Math.random()<0.30) special='limitdown'; }
    else if(p>0.02 && Math.random() < 0.085){ special = (Math.random() < (0.42 - p*0.18)) ? 'limitup' : 'limitdown'; }
    if(special){ isUp = (special==='limitup'); level = 10; }
    if(bullTimer>0){ if(special!=='limitup') special=null; isUp=true; }   // 불장: 양봉만
    var spec = candleSpec(level, isUp);
    var uw = Math.round(spec.up  * (0.4 + Math.random()*1.6));
    var lw = Math.round(spec.low * (0.4 + Math.random()*1.6));
    var bh = Math.round(spec.bodyH * (0.85 + Math.random()*0.4));
    if(special){ uw=10; lw=10; bh=124; if(special==='limitup'){ spec.width=32; } else { var LDW=[38,52,66,82,100]; spec.width=LDW[Math.floor(Math.random()*5)]; } }
    var totalH = uw + bh + lw;
    var x = Math.random()*(W - spec.width - 8) + 4;
    if(player && !isUp && (crashTimer>0 || (newsTimer>0 && newsType==='fake')) && Math.random()<0.4){
      var pc=player.x+player.w/2, tx=pc - spec.width/2 + (Math.random()-0.5)*player.w*2.4;
      x=Math.max(4, Math.min(W-spec.width-4, tx));   // 캠핑 방지: 가끔 조준(단 이동으로 회피 가능)
    }
    var speed = (235 + p*190) * (0.85 + Math.random()*0.4) * (1 + level*0.012);
    if(special==='limitup') speed *= 0.8;
    candles.push({ x:x, y:-totalH-10, level:level, isUp:isUp, special:special, spec:spec, uw:uw, lw:lw, bh:bh, totalH:totalH, speed:speed, dead:false });
  }
  function update(dt){
    timeLeft -= dt;
    if(timeLeft<=0){ timeLeft=0; endGame(); return; }

    var dir = (keys.right?1:0) - (keys.left?1:0);
    if(dir!==0){
      moveSpd = Math.min(W*2.4, (moveSpd>0?moveSpd:W*0.6) + W*2.8*dt);
      player.x += dir*moveSpd*dt;
    } else { moveSpd = 0; }
    player.x = Math.max(0, Math.min(W-player.w, player.x));

    spawnTimer -= dt;
    var interval = Math.max(0.22, 0.36 - difficulty()*0.16);
    if(spawnTimer<=0){ spawnCandle(); if(Math.random() < 0.52 + difficulty()*0.28) spawnCandle(); spawnTimer = interval; }

    var pTop=player.y+player.h*0.12, pB=player.y+player.h, pL=player.x+player.w*0.26, pR=player.x+player.w*0.74;
    for(var i=0;i<candles.length;i++){
      var c=candles[i];
      c.y += c.speed*dt;
      if(c.dead) continue;
      if(c.news){
        var nhit = c.x < pR && c.x+c.w > pL && c.y < pB && c.y+c.h > pTop;
        if(nhit){ c.dead=true; triggerNews(c.kind); }
        continue;
      }
      var cw=c.spec.width, ccx=c.x+cw/2;
      var bodyTop=c.y+c.uw, bodyBot=bodyTop+c.bh;
      // 몸통 판정
      var bodyHit = c.x < pR && c.x+cw > pL && bodyTop < pB && bodyBot > pTop;
      // 꼬리(심지) 판정 - 캐릭터가 중심 x를 지나면 위/아래 꼬리에 닿아도 먹힘
      var wickHit = ccx > pL && ccx < pR && c.y < pB && (c.y+c.totalH) > pTop;
      var overlap = bodyHit || wickHit;
      if(overlap){
        c.dead=true;
        if(c.special==='limitup'){
          var gu=Math.round(money*0.3); money+=gu; combo++; if(combo>maxCombo)maxCombo=combo; hansangCount++; downStreak=0; if(combo===30 && bullArmed && bullTimer<=0){ bullArmed=false; bullMarket(); }
          addFloat('상한가 +'+fmtMan(gu), c.x+cw/2, player.y, '#3fb950', 14);
          pulseMoney(1, 13); showCombo(combo); setEmo('wow',0.9); sfx('limitup');
        } else if(c.special==='limitdown'){
          var ld=Math.round(money*0.3); money-=ld; combo=0; bullArmed=true; downStreak++;
          addFloat('하한가 -'+fmtMan(ld), c.x+cw/2, player.y, '#f85149', 14);
          pulseMoney(-1, 13); shake=22; setEmo('shock',0.9); sfx('limitdown');
          if(money<=0){ money=0; updateHUD(); endGame(); return; }
          if(crashTimer>0){ crashHits++; if(crashHits>=2) zzinban(); }   // 폭락장 중 하한가 2방 -> 찐반!!!
        } else if(c.isUp){
          combo++; if(combo>maxCombo)maxCombo=combo; downStreak=0; if(combo===30 && bullArmed && bullTimer<=0){ bullArmed=false; bullMarket(); }
          var gmult = Math.min(3, 1 + (combo-1)*0.12);   // 연속 양봉마다 +12%, 최대 3배
          var gain = Math.round(c.spec.value * gmult);
          money += gain;
          if(c.level>=9) hansangCount++;
          addFloat('+'+fmtMan(gain), c.x+cw/2, player.y, UP_COLOR, c.level);
          pulseMoney(1, c.level); setEmo('happy',0.35); sfx('up',combo);
          if(combo>=3) showCombo(combo);
        } else {
          downStreak++; combo=0; bullArmed=true;
          var dmult = Math.min(3, 1 + (downStreak-1)*0.4);   // 연속 음봉마다 +40%, 최대 3배
          var loss = Math.round(c.spec.value * dmult);
          money -= loss;
          addFloat('-'+fmtMan(loss), c.x+cw/2, player.y, DOWN_COLOR, c.level);
          if(downStreak>=2) addFloat(downStreak+'연속', c.x+cw/2+cw*0.45, player.y-14, 'rgba(248,81,73,0.72)', 1);   // 연속 표시는 작고 은은하게
          pulseMoney(-1, c.level); setEmo('hurt',0.5); sfx('down');
          shake=10+c.level+Math.min(14,downStreak*2);
          if(money<=0){ money=0; updateHUD(); endGame(); return; }
        }
        updateHUD();
      }
    }
    var kept=[];
    for(var j=0;j<candles.length;j++){ if(candles[j].y < H+200 && !candles[j].dead) kept.push(candles[j]); }
    candles=kept;

    for(var k=0;k<floatTexts.length;k++){ floatTexts[k].y -= floatTexts[k].vy*dt; floatTexts[k].life -= dt*1.3; }
    var kf=[]; for(var m=0;m<floatTexts.length;m++){ if(floatTexts[m].life>0) kf.push(floatTexts[m]); } floatTexts=kf;
    if(shake>0) shake=Math.max(0, shake-40*dt);
    if(flash>0) flash=Math.max(0, flash-dt*1.6);
    if(bullTimer>0) bullTimer=Math.max(0, bullTimer-dt);
    if(emoTimer>0){ emoTimer-=dt; if(emoTimer<=0) emo=null; }
    if(newsTimer>0){ newsTimer-=dt; if(newsTimer<=0) newsType=null; }
    if(crashTimer>0) crashTimer=Math.max(0, crashTimer-dt);
    if(flashR>0) flashR=Math.max(0, flashR-dt*1.6);
    if(newsQueue.length && (GAME_TIME-timeLeft)>=newsQueue[0] && newsTimer<=0 && bullTimer<=0 && crashTimer<=0){ newsQueue.shift(); spawnNews(); }
    if(crashQueue.length && (GAME_TIME-timeLeft)>=crashQueue[0] && crashTimer<=0 && bullTimer<=0 && newsTimer<=0){ crashQueue.shift(); startCrash(); }
  }

  function drawSpeech(lines){
    var cx=player.x+player.w/2;
    ctx.save();
    ctx.font='700 13px sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
    var pad=9, lh=17, maxw=0;
    for(var i=0;i<lines.length;i++){ maxw=Math.max(maxw, ctx.measureText(lines[i]).width); }
    var bw=maxw+pad*2, bh=lines.length*lh+pad*2;
    var by=player.y-16-bh, bx=Math.max(6, Math.min(W-bw-6, cx-bw/2));
    ctx.fillStyle='rgba(255,255,255,0.97)'; ctx.strokeStyle='rgba(0,0,0,0.28)'; ctx.lineWidth=1.5;
    roundRect(bx,by,bw,bh,9); ctx.fill(); ctx.stroke();
    var tx=Math.max(bx+12, Math.min(bx+bw-12, cx));
    ctx.fillStyle='rgba(255,255,255,0.97)'; ctx.beginPath(); ctx.moveTo(tx-7,by+bh-1); ctx.lineTo(tx+7,by+bh-1); ctx.lineTo(tx,by+bh+10); ctx.closePath(); ctx.fill();
    ctx.fillStyle='#c0392b';
    for(var j=0;j<lines.length;j++){ ctx.fillText(lines[j], bx+bw/2, by+pad+lh/2+j*lh); }
    ctx.restore();
  }

  function drawCandle(c){
    var x=c.x, y=c.y, cw=c.spec.width, cx=x+cw/2;
    var bodyTop=y+c.uw, bodyBot=bodyTop+c.bh;
    if(c.special){
      var blink=0.5+0.5*Math.sin(Date.now()/70), fill, outline, arrow;
      if(c.special==='limitup'){ fill='hsl(140,68%,'+(42+14*Math.sin(Date.now()/70))+'%)'; outline='rgba(190,255,200,'+(0.3+0.6*blink)+')'; arrow='↑'; }
      else { fill='hsl(2,85%,'+(52+14*Math.sin(Date.now()/70))+'%)'; outline='rgba(255,195,185,'+(0.3+0.6*blink)+')'; arrow='↓'; }
      ctx.strokeStyle=fill; ctx.lineWidth=Math.max(2,cw*0.12);
      ctx.beginPath(); ctx.moveTo(cx,y); ctx.lineTo(cx,bodyTop); ctx.moveTo(cx,bodyBot); ctx.lineTo(cx,bodyBot+c.lw); ctx.stroke();
      ctx.fillStyle=fill; roundRect(x,bodyTop,cw,Math.max(c.bh,3),4); ctx.fill();
      ctx.strokeStyle=outline; ctx.lineWidth=3.5; roundRect(x,bodyTop,cw,Math.max(c.bh,3),4); ctx.stroke();
      ctx.fillStyle='#fff'; ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.font='900 '+Math.max(16,Math.min(cw*0.48,c.bh*0.42))+'px sans-serif'; ctx.fillText(arrow, cx, bodyTop+c.bh*0.30);
      ctx.font='900 '+Math.max(10,Math.min(cw*0.30,c.bh*0.24))+'px sans-serif'; ctx.fillText('30%', cx, bodyTop+c.bh*0.72);
      ctx.textBaseline='alphabetic';
      return;
    }
    var col=c.isUp?UP_COLOR:DOWN_COLOR;
    ctx.strokeStyle=col; ctx.lineWidth=Math.max(2,cw*0.16);
    ctx.beginPath();
    ctx.moveTo(cx,y); ctx.lineTo(cx,bodyTop);
    ctx.moveTo(cx,bodyBot); ctx.lineTo(cx,bodyBot+c.lw);
    ctx.stroke();
    ctx.fillStyle=col;
    roundRect(x,bodyTop,cw,Math.max(c.bh,3),Math.min(5,cw*0.3)); ctx.fill();
  }
  function render(){

    for(var gy=80; gy<H; gy+=48){ ctx.beginPath(); ctx.moveTo(0,gy); ctx.lineTo(W,gy); ctx.stroke(); }
    for(var i=0;i<candles.length;i++){ if(candles[i].news) drawNews(candles[i]); else drawCandle(candles[i]); }
    if(state==='play' && player) drawPlayer();

    for(var f=0;f<floatTexts.length;f++){
      var ft=floatTexts[f];
      var sz = ft.base + (1-ft.life)*ft.base*0.45;
      ctx.globalAlpha=Math.max(0,Math.min(1,ft.life*1.4));

      ctx.save();
      ctx.strokeStyle='rgba(126,231,135,'+(0.55+0.4*_p)+')';
      ctx.lineWidth=3+2*_p; ctx.shadowColor='#3fb950'; ctx.shadowBlur=22;

    ctx.restore();

  function loop(ts){
    if(state!=='play'){ lastTS=ts; requestAnimationFrame(loop); return; }
    var dt=(ts-lastTS)/1000; lastTS=ts;
    if(!(dt>0)) dt=0.016;
    if(dt>0.05) dt=0.05;
    update(dt);
    if(state==='play'){
      render();
      var diff = money - displayMoney;
      if(Math.abs(diff) < 5000) displayMoney = money;
      else displayMoney += diff * Math.min(1, dt*9);
      if(moneyNumEl) moneyNumEl.textContent = fmtWon(displayMoney);
      document.getElementById('timeLabel').textContent = timeLeft.toFixed(1)+'s';
      document.getElementById('timebar').style.width = (timeLeft/GAME_TIME*100)+'%';
    }
    requestAnimationFrame(loop);
  }

  function roundRect(x,y,w,h,r){ r=Math.min(r,w/2,h/2); ctx.beginPath();
    ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r);
    ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath(); }
  function fmtWon(n){ return Math.round(n).toLocaleString('ko-KR'); }
  function fmtMan(n){
    if(n>=100000000) return (n/100000000).toFixed(n%100000000?1:0)+'억';
    return Math.round(n/10000).toLocaleString('ko-KR')+'만';
  }

  function zzinban(){

  function spawnNews(){

  function bgmTick(){

    var bull = bullTimer>0;
    while(bgmT < AC.currentTime + 0.4){
      if(bull){
        // ── 불장: 경쾌한 무적 BGM ──
        var blf=BULL_LEAD[bullStep % BULL_LEAD.length];
        if(blf){ bgmNote(blf, bgmT, 0.10, 'square', 0.09); bgmNote(blf*2, bgmT, 0.06, 'triangle', 0.035); }
        var bbf=BULL_BASS[bullStep % BULL_BASS.length];
        if(bbf) bgmNote(bbf, bgmT, 0.10, 'sine', 0.12);
        if(bullStep % 2 === 0) bgmKick(bgmT);

        var bf=BASS[((bgmStep/4)|0) % BASS.length];

    if(SB_ON){
      document.getElementById('lbList').innerHTML='<li><span class="name" style="color:#9da7b3">랭킹 불러오는 중...</span></li>';
      submitRemote(playerName, money, maxCombo, function(){ showLB('lbList','score',resultMe); });
    } else {
      showLB('lbList','score',resultMe);
    }
    var rs=document.getElementById('resultScreen'); rs.classList.remove('hidden');
    var se=document.getElementById('resultScore'); se.style.fontSize='40px';
    requestAnimationFrame(function(){ var fs=40; while(se.scrollWidth>se.clientWidth && fs>18){ fs-=1; se.style.fontSize=fs+'px'; } });
  }

  moneyEl=document.getElementById('money');
  moneyNumEl=document.getElementById('moneyNum');
  nameInput=document.getElementById('nameInput');
  eventEl=document.getElementById('eventBanner');
  newsHeadlineEl=document.getElementById('newsHeadline');
  showIntroLB();
  (function(){
    var groups=document.querySelectorAll('.lbTabs');
    for(var gi=0;gi<groups.length;gi++){
      (function(g){
        var target=g.getAttribute('data-target');
        var btns=g.querySelectorAll('.lbTab');
        for(var bi=0;bi<btns.length;bi++){
          btns[bi].addEventListener('click', function(){
            for(var k=0;k<btns.length;k++) btns[k].classList.remove('active');
            this.classList.add('active');
            var me = target==='lbList' ? resultMe : null;
            showLB(target, this.getAttribute('data-mode'), me);
          });
        }
      })(groups[gi]);
    }
  })();
  try{ var sv=localStorage.getItem(NAME_KEY); if(sv && nameInput) nameInput.value=sv; }catch(e){}
  if(nameInput) nameInput.addEventListener('keydown', function(e){ if(e.key==='Enter') startGame(); });
  var sndBtn=document.getElementById('sndBtn');
  if(sndBtn) sndBtn.addEventListener('click', function(){ muted=!muted; sndBtn.textContent=muted?'🔇':'🔊'; initAudio(); });
  document.getElementById('startBtn').addEventListener('click', startGame);
  document.getElementById('retryBtn').addEventListener('click', startGame);

  resize();
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
