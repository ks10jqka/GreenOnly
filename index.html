<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>얼마까지 벌어봤니</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { height:100%; background:#1b2431; overflow:hidden; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Malgun Gothic",sans-serif; }
  #wrap { position:relative; width:100vw; height:100vh; height:100dvh; margin:0 auto; max-width:520px; background:#0d1117; box-shadow:0 0 0 1px #313d4e, 0 0 40px rgba(0,0,0,.6); }
  canvas { display:block; width:100%; height:100%; touch-action:none; }
  #hud { position:absolute; top:0; left:0; right:0; padding:10px 14px; pointer-events:none; color:#e6edf3; z-index:5; }
  #money { position:absolute; top:58px; left:0; right:0; text-align:center; font-size:40px; font-weight:900; letter-spacing:-1px; color:#e6edf3; text-shadow:0 2px 10px rgba(0,0,0,.7); z-index:5; pointer-events:none; transform-origin:center top; transition:transform .1s ease, color .35s ease; }
  #money .won { font-size:20px; opacity:.7; margin-left:3px; }
  #subrow { display:flex; justify-content:space-between; align-items:center; margin-top:4px; font-size:13px; font-weight:600; }
  #title-badge { position:absolute; top:110px; left:0; right:0; text-align:center; font-size:20px; font-weight:800; color:#ff8c42; text-shadow:0 0 12px rgba(255,140,66,.55), 0 1px 4px #000; z-index:5; pointer-events:none; }
  #timeLabel { position:absolute; top:12px; left:0; right:0; text-align:center; font-size:24px; font-weight:800; color:#e6edf3; text-shadow:0 2px 8px rgba(0,0,0,.7); z-index:5; pointer-events:none; }
  #timebar-bg { position:absolute; top:46px; left:14px; right:14px; height:6px; background:#21262d; border-radius:4px; overflow:hidden; }
  #timebar { height:100%; width:100%; background:linear-gradient(90deg,#3fb950,#f7c948,#f85149); }
  #combo { position:absolute; top:142px; left:0; right:0; text-align:center; font-size:20px; font-weight:900; color:#f7c948; opacity:0; transition:opacity .2s; pointer-events:none; z-index:6; text-shadow:0 2px 8px rgba(0,0,0,.7); }
  #eventBanner { position:absolute; top:32%; left:0; right:0; text-align:center; font-size:50px; font-weight:900; letter-spacing:-1px; color:#7ee787; text-shadow:0 0 26px rgba(63,185,80,1), 0 0 10px rgba(126,231,135,.9), 0 3px 10px #000; opacity:0; z-index:8; pointer-events:none; }
  #eventBanner.show { animation:evt 1.7s ease-out; }
  @keyframes evt { 0%{opacity:0; transform:scale(.3);} 12%{opacity:1; transform:scale(1.35);} 22%{transform:scale(1.05);} 80%{opacity:1; transform:scale(1.05);} 100%{opacity:0; transform:scale(1.15);} }
  .overlay { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; background:rgba(13,17,23,.92); color:#e6edf3; z-index:20; padding:24px; overflow-y:auto; }
  .hidden { display:none; }
  .overlay h1 { font-size:30px; font-weight:900; margin-bottom:6px; letter-spacing:-1px; }
  .overlay h1 .up { color:#3fb950; } .overlay h1 .down { color:#f85149; }
  .overlay p { font-size:14px; line-height:1.7; color:#9da7b3; margin-bottom:8px; max-width:340px; }
  .btn { margin-top:18px; padding:14px 40px; font-size:18px; font-weight:800; color:#fff; background:linear-gradient(135deg,#2ea043,#3fb950); border:none; border-radius:30px; cursor:pointer; box-shadow:0 6px 20px rgba(63,185,80,.45); }
  .btn:active { transform:scale(.96); }
  #retryBtn { background:linear-gradient(135deg,#2ea043,#3fb950); box-shadow:0 6px 20px rgba(63,185,80,.45); }
  #nameInput { margin:22px 0 10px; width:220px; max-width:70%; padding:12px 16px; font-size:16px; font-weight:700; text-align:center; color:#e6edf3; background:#161b22; border:2px solid #30363d; border-radius:14px; outline:none; }
  #nameInput:focus { border-color:#f7c948; }
  #nameInput::placeholder { color:#6e7681; font-weight:500; }
  .rule { display:flex; gap:20px; margin:14px 0 4px; }
  .rule div { font-size:13px; }
  .swatch { display:inline-block; width:14px; height:22px; border-radius:2px; vertical-align:middle; margin-right:5px; }
  .up-sw { background:#3fb950; } .down-sw { background:#f85149; }
  #resultHead { font-size:22px; }
  #resultScore { font-size:40px; font-weight:900; color:#f7c948; margin:6px 0; }
  #resultTitle { font-size:28px; font-weight:900; margin-bottom:4px; color:#ff8c42; text-shadow:0 0 16px rgba(255,140,66,.6); }
  #resultStats { font-size:18px; font-weight:700; color:#c9d1d9; margin-bottom:6px; }
  .lb { list-style:none; width:100%; max-width:440px; margin-top:8px; text-align:left; }
  .lb li { display:flex; justify-content:space-between; padding:6px 12px; border-radius:8px; font-size:14px; }
  .lb li:nth-child(odd){ background:#161b22; }
  .lb li.me { background:#1f2d1f; color:#7ee787; font-weight:700; }
  .lb .rank { width:26px; color:#9da7b3; }
  .lb .name { flex:1; }
  #lbListStart { max-width:320px; margin-top:6px; }
  #lbListStart li { font-size:13px; padding:5px 12px; }
  #lbTitle { font-size:13px; font-weight:700; color:#9da7b3; margin-top:14px; }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="game"></canvas>
  <div id="timeLabel">90.0s</div>
  <div id="timebar-bg"><div id="timebar"></div></div>
  <div id="money"><span id="moneyNum">30,000,000</span><span class="won">원</span></div>
  <div id="title-badge">개미</div>
  <div id="combo"></div>
  <div id="eventBanner"></div>

  <div id="startScreen" class="overlay">
    <h1>얼마까지 <span class="up">벌어봤니</span></h1>
    <div class="rule">
      <div><span class="swatch up-sw"></span>UP</div>
      <div><span class="swatch down-sw"></span>DOWN</div>
    </div>
    <input id="nameInput" type="text" maxlength="10" placeholder="닉네임 입력" autocomplete="off">
    <button class="btn" id="startBtn">게임 시작</button>
    <p style="font-size:11px;margin-top:14px">조작방법 : 방향키 누르거나, 마우스 드래그</p>
    <div style="font-size:13px;font-weight:800;color:#f7c948;margin-top:16px;">🏆 리더보드 TOP 5</div>
    <ol id="lbListStart" class="lb"></ol>
  </div>

  <div id="resultScreen" class="overlay hidden">
    <h1 id="resultHead">장 마감!</h1>
    <div id="resultTitle"></div>
    <div id="resultScore"></div>
    <div id="resultStats"></div>
    <div id="lbTitle">리더보드 TOP 10</div>
    <ol id="lbList" class="lb"></ol>
    <button class="btn" id="retryBtn">다시하기</button>
  </div>
</div>
<script>
(function(){
  "use strict";
  var cv = document.getElementById('game');
  var ctx = cv.getContext('2d');
  var wrap = document.getElementById('wrap');

  var W=0, H=0, DPR=Math.min(window.devicePixelRatio||1, 2);
  function resize(){
    var r = wrap.getBoundingClientRect();
    W = r.width || 360; H = r.height || 640;
    cv.width = W*DPR; cv.height = H*DPR;
    ctx.setTransform(DPR,0,0,DPR,0,0);
    if(player){ player.w=Math.max(44,W*0.12); player.h=player.w*1.5; player.y=H-player.h-Math.max(64,H*0.11); }
  }

  var START_MONEY = 30000000;
  var GAME_TIME = 90;
  var UP_COLOR='#3fb950', UP_COLOR_D='#2ea043';
  var DOWN_COLOR='#f85149', DOWN_COLOR_D='#c1352e';

  var SHAPES = [
    { n:'십자형',   b:10, u:26, l:26 },
    { n:'잠자리형', b:12, u:4,  l:46 },
    { n:'비석형',   b:12, u:46, l:4  },
    { n:'망치형',   b:26, u:6,  l:44 },
    { n:'역망치형', b:26, u:44, l:6  },
    { n:'팽이형',   b:42, u:22, l:22 },
    { n:'유성형',   b:34, u:50, l:8  },
    { n:'교수형',   b:34, u:8,  l:50 },
    { n:'중형',     b:80, u:14, l:14 },
    { n:'장대',     b:130,u:10, l:10 },
    { n:'초장대',   b:152,u:8,  l:8  },
    { n:'나락',     b:178,u:6,  l:6  }
  ];
  var VALUES = [5,15,30,60,120,200,350,550,800,1200,1800,2700];
  function candleSpec(level, isUp){
    var s = SHAPES[level-1];
    var name = s.n;
    if(level===9)  name = isUp?'중양봉':'중음봉';
    if(level===10) name = isUp?'장대양봉':'장대음봉';
    if(level===11) name = '초장대음봉';
    if(level===12) name = '나락음봉';
    var width = isUp ? (36 - level*2) : (28 + level*2);
    return { value:VALUES[level-1]*10000, name:name, bodyH:s.b, up:s.u, low:s.l, width:width };
  }

  var state='start', money=START_MONEY, displayMoney=START_MONEY, timeLeft=GAME_TIME;
  var candles=[], floatTexts=[], spawnTimer=0, lastTS=0;
  var combo=0, maxCombo=0, hansangCount=0, shake=0, flash=0, bullTimer=0, bullArmed=true;
  var emo=null, emoTimer=0;
  var newsTimer=0, newsType=null, newsQueue=[];
  var crashTimer=0, crashQueue=[], flashR=0;
  var player=null, targetX=null;
  var keys={left:false,right:false};
  var moveSpd=0;
  var moneyEl=null, moneyNumEl=null, pulseTimer=null, colorTimer=null;
  var nameInput=null, playerName='', eventEl=null;
  var NAME_KEY='ybmb_name';

  function resetGame(){
    money=START_MONEY; displayMoney=START_MONEY; timeLeft=GAME_TIME;
    candles=[]; floatTexts=[]; spawnTimer=0;
    combo=0; maxCombo=0; hansangCount=0; shake=0; flash=0; bullTimer=0; bullArmed=true; emo=null; emoTimer=0; newsTimer=0; newsType=null; targetX=null; moveSpd=0;
    newsQueue=[8+Math.random()*12, 34+Math.random()*12, 60+Math.random()*14];
    crashTimer=0; flashR=0; crashQueue=[38+Math.random()*12, 62+Math.random()*14];
    player={ w:Math.max(44,W*0.12), h:0, x:0, y:0 };
    player.h=player.w*1.5;
    player.x=W/2-player.w/2;
    player.y=H-player.h-Math.max(64,H*0.11);
  }

  var dragFX=null, dragPX=0;
  function pDown(e){
    var t = e.touches ? e.touches[0] : e;
    var rect = cv.getBoundingClientRect();
    dragFX = t.clientX - rect.left; dragPX = player ? player.x : 0;
  }
  function pMove(e){
    if(dragFX===null || !player) return;
    var t = e.touches ? e.touches[0] : e;
    var rect = cv.getBoundingClientRect();
    var fx = t.clientX - rect.left;
    player.x = Math.max(0, Math.min(W-player.w, dragPX + (fx - dragFX)*0.6));
  }
  cv.addEventListener('touchstart', function(e){ e.preventDefault(); pDown(e); }, {passive:false});
  cv.addEventListener('touchmove',  function(e){ e.preventDefault(); pMove(e); }, {passive:false});
  cv.addEventListener('touchend',   function(e){ e.preventDefault(); dragFX=null; }, {passive:false});
  cv.addEventListener('mousedown', function(e){ pDown(e); });
  cv.addEventListener('mousemove', function(e){ pMove(e); });
  window.addEventListener('mouseup', function(){ dragFX=null; });
  window.addEventListener('keydown', function(e){ if(e.key==='ArrowLeft')keys.left=true; if(e.key==='ArrowRight')keys.right=true; });
  window.addEventListener('keyup', function(e){ if(e.key==='ArrowLeft')keys.left=false; if(e.key==='ArrowRight')keys.right=false; });
  window.addEventListener('resize', resize);

  function difficulty(){ return 1 - (timeLeft/GAME_TIME); }

  function spawnCandle(){
    var p = difficulty();
    // 뉴스 효과: 떡상=양봉 확률 급상승 / 떡락=음봉 확률 급상승
    var isUp = (newsTimer>0) ? (Math.random() < (newsType==='boom' ? 0.9 : 0.1)) : (Math.random() < (0.62 - p*0.18));
    if(crashTimer>0) isUp=false;   // 폭락장: 음봉만
    var level = 1 + Math.floor(Math.pow(Math.random(), 1.12 - p*0.5)*10);
    level = Math.max(1, Math.min(10, level));
    if(!isUp && ((difficulty()>0.5 && Math.random()<0.16) || (crashTimer>0 && Math.random()<0.55))){ level = (Math.random()<0.5)?12:11; }
    var special = null;
    if(crashTimer>0){ if(Math.random()<0.22) special='limitdown'; }
    else if(p>0.08 && Math.random() < 0.075){ special = (Math.random()<0.42) ? 'limitup' : 'limitdown'; }
    if(special){ isUp = (special==='limitup'); level = 10; }
    if(bullTimer>0){ special=null; isUp=true; }   // 불장: 양봉만
    var spec = candleSpec(level, isUp);
    var uw = Math.round(spec.up  * (0.4 + Math.random()*1.6));
    var lw = Math.round(spec.low * (0.4 + Math.random()*1.6));
    var bh = Math.round(spec.bodyH * (0.85 + Math.random()*0.4));
    if(special){ uw=10; lw=10; bh=124; if(special==='limitup'){ spec.width=32; } else { var LDW=[38,52,66,82,100]; spec.width=LDW[Math.floor(Math.random()*5)]; } }
    var totalH = uw + bh + lw;
    var x = Math.random()*(W - spec.width - 8) + 4;
    var speed = (235 + p*190) * (0.85 + Math.random()*0.4) * (1 + level*0.012);
    if(special==='limitup') speed *= 0.8;
    candles.push({ x:x, y:-totalH-10, level:level, isUp:isUp, special:special, spec:spec, uw:uw, lw:lw, bh:bh, totalH:totalH, speed:speed, dead:false });
  }
  function update(dt){
    timeLeft -= dt;
    if(timeLeft<=0){ timeLeft=0; endGame(); return; }

    var dir = (keys.right?1:0) - (keys.left?1:0);
    if(dir!==0){
      moveSpd = Math.min(W*1.7, (moveSpd>0?moveSpd:W*0.55) + W*1.7*dt);
      player.x += dir*moveSpd*dt;
    } else { moveSpd = 0; }
    player.x = Math.max(0, Math.min(W-player.w, player.x));

    spawnTimer -= dt;
    var interval = Math.max(0.22, 0.4 - difficulty()*0.18);
    if(spawnTimer<=0){ spawnCandle(); if(Math.random() < 0.4 + difficulty()*0.3) spawnCandle(); spawnTimer = interval; }

    var pTop=player.y+player.h*0.12, pB=player.y+player.h, pL=player.x+player.w*0.26, pR=player.x+player.w*0.74;
    for(var i=0;i<candles.length;i++){
      var c=candles[i];
      c.y += c.speed*dt;
      if(c.dead) continue;
      if(c.news){
        var nhit = c.x < pR && c.x+c.w > pL && c.y < pB && c.y+c.h > pTop;
        if(nhit){ c.dead=true; triggerNews(c.kind); }
        continue;
      }
      var cw=c.spec.width, ccx=c.x+cw/2;
      var bodyTop=c.y+c.uw, bodyBot=bodyTop+c.bh;
      // 몸통 판정
      var bodyHit = c.x < pR && c.x+cw > pL && bodyTop < pB && bodyBot > pTop;
      // 꼬리(심지) 판정 - 캐릭터가 중심 x를 지나면 위/아래 꼬리에 닿아도 먹힘
      var wickHit = ccx > pL && ccx < pR && c.y < pB && (c.y+c.totalH) > pTop;
      var overlap = bodyHit || wickHit;
      if(overlap){
        c.dead=true;
        if(c.special==='limitup'){
          var gu=Math.round(money*0.3); money+=gu; combo++; if(combo>maxCombo)maxCombo=combo; hansangCount++; if(combo===20 && bullArmed){ bullArmed=false; bullMarket(); }
          addFloat('상한가 +'+fmtMan(gu), c.x+cw/2, player.y, '#3fb950', 14);
          pulseMoney(1, 13); showCombo(combo); setEmo('wow',0.9);
        } else if(c.special==='limitdown'){
          var ld=Math.round(money*0.3); money-=ld; combo=0; bullArmed=true;
          addFloat('하한가 -'+fmtMan(ld), c.x+cw/2, player.y, '#f85149', 14);
          pulseMoney(-1, 13); shake=22; setEmo('shock',0.9);
          if(money<=0){ money=0; updateHUD(); endGame(); return; }
        } else if(c.isUp){
          money += c.spec.value; combo++; if(combo>maxCombo)maxCombo=combo; if(combo===20 && bullArmed){ bullArmed=false; bullMarket(); }
          if(c.level>=9) hansangCount++;
          addFloat('+'+fmtMan(c.spec.value), c.x+cw/2, player.y, UP_COLOR, c.level);
          pulseMoney(1, c.level); setEmo('happy',0.35);
          if(combo>=3) showCombo(combo);
        } else {
          money -= c.spec.value; combo=0; bullArmed=true;
          addFloat('-'+fmtMan(c.spec.value), c.x+cw/2, player.y, DOWN_COLOR, c.level);
          pulseMoney(-1, c.level); setEmo('hurt',0.5);
          shake=10+c.level;
          if(money<=0){ money=0; updateHUD(); endGame(); return; }
        }
        updateHUD();
      }
    }
    var kept=[];
    for(var j=0;j<candles.length;j++){ if(candles[j].y < H+200 && !candles[j].dead) kept.push(candles[j]); }
    candles=kept;

    for(var k=0;k<floatTexts.length;k++){ floatTexts[k].y -= floatTexts[k].vy*dt; floatTexts[k].life -= dt*1.3; }
    var kf=[]; for(var m=0;m<floatTexts.length;m++){ if(floatTexts[m].life>0) kf.push(floatTexts[m]); } floatTexts=kf;
    if(shake>0) shake=Math.max(0, shake-40*dt);
    if(flash>0) flash=Math.max(0, flash-dt*1.6);
    if(bullTimer>0) bullTimer=Math.max(0, bullTimer-dt);
    if(emoTimer>0){ emoTimer-=dt; if(emoTimer<=0) emo=null; }
    if(newsTimer>0){ newsTimer-=dt; if(newsTimer<=0) newsType=null; }
    if(crashTimer>0) crashTimer=Math.max(0, crashTimer-dt);
    if(flashR>0) flashR=Math.max(0, flashR-dt*1.6);
    if(newsQueue.length && (GAME_TIME-timeLeft)>=newsQueue[0] && newsTimer<=0 && bullTimer<=0 && crashTimer<=0){ newsQueue.shift(); spawnNews(); }
    if(crashQueue.length && (GAME_TIME-timeLeft)>=crashQueue[0] && crashTimer<=0 && bullTimer<=0 && newsTimer<=0){ crashQueue.shift(); startCrash(); }
  }

  function drawPlayer(){
    var x=player.x, y=player.y, w=player.w, h=player.h, cx=w/2;
    var good = money>=START_MONEY;
    var bob = Math.sin(Date.now()/260)*h*0.01;
    ctx.save(); ctx.translate(x, y+bob);

    var skin=ctx.createLinearGradient(0,h*0.04,0,h*0.30);
    skin.addColorStop(0,'#f7d4ac'); skin.addColorStop(1,'#e9bd90');
    var shirt=ctx.createLinearGradient(0,h*0.30,0,h*0.64);
    shirt.addColorStop(0,'#ffffff'); shirt.addColorStop(1,'#dbe2ea');
    var hairG=ctx.createLinearGradient(0,h*0.0,0,h*0.16);
    hairG.addColorStop(0,'#ecc257'); hairG.addColorStop(1,'#c6942f');
    var tieC = good?'#2ea043':'#d13b34';
    var hand='#e4b587';

    // 바닥 그림자
    ctx.save(); ctx.globalAlpha=0.25; ctx.fillStyle='#000';
    ctx.beginPath(); ctx.ellipse(cx, h-3-bob, w*0.40, h*0.032, 0,0,7); ctx.fill(); ctx.restore();

    // 다리 / 구두
    ctx.fillStyle='#2b3446';
    roundRect(cx-w*0.15,h*0.63,w*0.12,h*0.36,4); ctx.fill();
    roundRect(cx+w*0.03,h*0.63,w*0.12,h*0.36,4); ctx.fill();
    ctx.fillStyle='#0f1116';
    roundRect(cx-w*0.19,h*0.95,w*0.20,h*0.055,3); ctx.fill();
    roundRect(cx+w*0.01,h*0.95,w*0.20,h*0.055,3); ctx.fill();

    // 목
    ctx.fillStyle='#e4b587';
    roundRect(cx-w*0.06,h*0.235,w*0.12,h*0.085,3); ctx.fill();

    // 와이셔츠 상의 + 어깨
    ctx.fillStyle=shirt;
    roundRect(cx-w*0.21,h*0.30,w*0.42,h*0.33,9); ctx.fill();
    ctx.beginPath(); ctx.arc(cx-w*0.175,h*0.335,w*0.085,0,7); ctx.fill();
    ctx.beginPath(); ctx.arc(cx+w*0.175,h*0.335,w*0.085,0,7); ctx.fill();

    // 소매(팔)
    ctx.strokeStyle=shirt; ctx.lineCap='round'; ctx.lineWidth=w*0.11;
    ctx.beginPath();
    ctx.moveTo(cx-w*0.19,h*0.37); ctx.lineTo(cx-w*0.13,h*0.52);
    ctx.moveTo(cx+w*0.19,h*0.37); ctx.lineTo(cx+w*0.13,h*0.52);
    ctx.stroke();

    // 셔츠 칼라
    ctx.strokeStyle='rgba(150,165,182,.7)'; ctx.lineWidth=Math.max(1,w*0.018); ctx.lineJoin='round'; ctx.lineCap='round';
    ctx.beginPath(); ctx.moveTo(cx-w*0.12,h*0.31); ctx.lineTo(cx-w*0.02,h*0.365); ctx.lineTo(cx,h*0.335); ctx.lineTo(cx+w*0.02,h*0.365); ctx.lineTo(cx+w*0.12,h*0.31); ctx.stroke();

    // 넥타이
    ctx.fillStyle=tieC;
    ctx.beginPath(); ctx.moveTo(cx-w*0.04,h*0.315); ctx.lineTo(cx+w*0.04,h*0.315); ctx.lineTo(cx,h*0.375); ctx.closePath(); ctx.fill();
    ctx.beginPath(); ctx.moveTo(cx-w*0.045,h*0.375); ctx.lineTo(cx+w*0.045,h*0.375); ctx.lineTo(cx+w*0.03,h*0.55); ctx.lineTo(cx,h*0.60); ctx.lineTo(cx-w*0.03,h*0.55); ctx.closePath(); ctx.fill();

    // 핸드폰
    var pw=w*0.21, ph=w*0.31, px=cx-pw/2, py=h*0.42;
    ctx.fillStyle='#20242c'; roundRect(px-1,py-1,pw+2,ph+2,pw*0.22); ctx.fill();
    ctx.fillStyle='#0c0e12'; roundRect(px,py,pw,ph,pw*0.2); ctx.fill();
    ctx.fillStyle= good?'#3fc46f':'#f0554d'; roundRect(px+pw*0.1,py+ph*0.11,pw*0.8,ph*0.74,pw*0.12); ctx.fill();
    ctx.fillStyle='#2a2f38'; ctx.beginPath(); ctx.arc(cx,py+ph*0.06,pw*0.035,0,7); ctx.fill();
    ctx.fillStyle='rgba(255,255,255,.92)'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.font='bold '+(ph*0.42)+'px sans-serif'; ctx.fillText(good?'▲':'▼', cx, py+ph*0.46); ctx.textBaseline='alphabetic';
    ctx.fillStyle='rgba(255,255,255,.55)'; roundRect(cx-pw*0.13,py+ph*0.9,pw*0.26,ph*0.028,2); ctx.fill();

    // 손 (폰 잡기)
    ctx.fillStyle=hand;
    ctx.beginPath(); ctx.arc(px, py+ph*0.66, w*0.055,0,7); ctx.fill();
    ctx.beginPath(); ctx.arc(px+pw, py+ph*0.66, w*0.055,0,7); ctx.fill();

    // 귀
    ctx.fillStyle='#e4b587';
    ctx.beginPath(); ctx.arc(cx-w*0.17,h*0.16,w*0.045,0,7); ctx.fill();
    ctx.beginPath(); ctx.arc(cx+w*0.17,h*0.16,w*0.045,0,7); ctx.fill();

    // 얼굴
    ctx.fillStyle=skin;
    ctx.beginPath(); ctx.arc(cx,h*0.155,w*0.185,0,7); ctx.fill();

    // 헤어(금발, 2:8 가르마) - 머리 원 안으로 클립
    ctx.save();
    ctx.beginPath(); ctx.arc(cx,h*0.155,w*0.187,0,7); ctx.clip();
    ctx.fillStyle=hairG;
    ctx.beginPath();
    ctx.moveTo(cx-w*0.20,h*0.16);
    ctx.lineTo(cx-w*0.20,h*0.05);
    ctx.quadraticCurveTo(cx-w*0.05,h*0.005, cx+w*0.12,h*0.03);
    ctx.quadraticCurveTo(cx+w*0.21,h*0.055, cx+w*0.20,h*0.16);
    ctx.quadraticCurveTo(cx+w*0.05,h*0.108, cx-w*0.03,h*0.135);
    ctx.lineTo(cx-w*0.06,h*0.10);
    ctx.quadraticCurveTo(cx-w*0.13,h*0.115, cx-w*0.20,h*0.16);
    ctx.closePath(); ctx.fill();
    ctx.strokeStyle='rgba(150,110,30,.55)'; ctx.lineWidth=Math.max(1,w*0.012); ctx.lineCap='round';
    ctx.beginPath(); ctx.moveTo(cx-w*0.06,h*0.095); ctx.quadraticCurveTo(cx-w*0.09,h*0.05, cx-w*0.11,h*0.03); ctx.stroke();
    ctx.restore();

    // ===== 표정 =====
    var expr = bullTimer>0 ? 'bull' : (emo || (good?'good':'bad'));
    var ey=h*0.16, eoff=w*0.065, wide=(expr==='wow'||expr==='shock'||expr==='bull');

    // 눈썹
    ctx.strokeStyle='#a87f2c'; ctx.lineWidth=Math.max(1.4,w*0.02); ctx.lineCap='round'; ctx.beginPath();
    if(expr==='hurt'){ ctx.moveTo(cx-w*0.12,h*0.122); ctx.lineTo(cx-w*0.03,h*0.15); ctx.moveTo(cx+w*0.12,h*0.122); ctx.lineTo(cx+w*0.03,h*0.15); }
    else if(wide){ ctx.moveTo(cx-w*0.12,h*0.113); ctx.lineTo(cx-w*0.03,h*0.108); ctx.moveTo(cx+w*0.12,h*0.113); ctx.lineTo(cx+w*0.03,h*0.108); }
    else { ctx.moveTo(cx-w*0.115,h*0.135); ctx.lineTo(cx-w*0.03,h*0.128); ctx.moveTo(cx+w*0.115,h*0.135); ctx.lineTo(cx+w*0.03,h*0.128); }
    ctx.stroke();

    // 눈
    if(expr==='bull'){
      ctx.fillStyle='#2ea043'; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.font='900 '+(w*0.13)+'px sans-serif';
      ctx.fillText('$', cx-eoff, ey); ctx.fillText('$', cx+eoff, ey); ctx.textBaseline='alphabetic';
    } else if(expr==='hurt'){
      ctx.strokeStyle='#33261a'; ctx.lineWidth=Math.max(1.8,w*0.026); ctx.lineCap='round';
      var rr2=w*0.036; ctx.beginPath();
      ctx.moveTo(cx-eoff-rr2,ey-rr2*0.7); ctx.lineTo(cx-eoff,ey); ctx.lineTo(cx-eoff-rr2,ey+rr2*0.7);
      ctx.moveTo(cx+eoff+rr2,ey-rr2*0.7); ctx.lineTo(cx+eoff,ey); ctx.lineTo(cx+eoff+rr2,ey+rr2*0.7);
      ctx.stroke();
    } else {
      var erx=wide?w*0.056:w*0.045, ery=wide?w*0.066:w*0.055, irr=wide?w*0.03:w*0.028, prr=(expr==='shock')?w*0.01:(wide?w*0.016:w*0.014);
      for(var si=0;si<2;si++){ var ex=cx+(si===0?-eoff:eoff);
        ctx.fillStyle='#fff'; ctx.beginPath(); ctx.ellipse(ex,ey,erx,ery,0,0,7); ctx.fill();
        ctx.fillStyle='#2f6fd0'; ctx.beginPath(); ctx.arc(ex,ey,irr,0,7); ctx.fill();
        ctx.fillStyle='#152238'; ctx.beginPath(); ctx.arc(ex,ey,prr,0,7); ctx.fill();
        ctx.fillStyle='rgba(255,255,255,.95)'; ctx.beginPath(); ctx.arc(ex-w*0.009,ey-w*0.013,w*0.007,0,7); ctx.fill();
      }
    }

    // 코
    ctx.strokeStyle='rgba(175,135,95,.7)'; ctx.lineWidth=Math.max(1,w*0.014); ctx.lineJoin='round';
    ctx.beginPath(); ctx.moveTo(cx,h*0.17); ctx.lineTo(cx-w*0.02,h*0.195); ctx.lineTo(cx+w*0.012,h*0.20); ctx.stroke();

    // 입
    ctx.strokeStyle='#8a4b2a'; ctx.lineWidth=Math.max(1.6,w*0.022); ctx.lineCap='round';
    if(expr==='bull'||expr==='wow'){ ctx.fillStyle='#7a3b28'; ctx.beginPath(); ctx.ellipse(cx,h*0.232,w*0.055,h*0.03,0,0,Math.PI); ctx.fill(); }
    else if(expr==='shock'){ ctx.fillStyle='#6b2f22'; ctx.beginPath(); ctx.ellipse(cx,h*0.246,w*0.034,h*0.028,0,0,7); ctx.fill(); }
    else if(expr==='hurt'||expr==='bad'){ ctx.beginPath(); ctx.arc(cx,h*0.26,w*0.05,1.15*Math.PI,1.85*Math.PI); ctx.stroke(); }
    else { ctx.beginPath(); ctx.arc(cx,h*0.222,w*0.05,0.15*Math.PI,0.85*Math.PI); ctx.stroke(); }

    // 식은땀 / 반짝이
    if(expr==='hurt'||expr==='shock'){ ctx.fillStyle='rgba(120,180,235,0.9)'; ctx.beginPath(); ctx.arc(cx+w*0.155,h*0.115,w*0.022,0,7); ctx.fill(); }
    if(expr==='bull'||expr==='wow'){
      ctx.strokeStyle='#ffe14d'; ctx.lineWidth=Math.max(1.5,w*0.016); ctx.lineCap='round';
      var sk=[[cx-w*0.21,h*0.08,w*0.03],[cx+w*0.21,h*0.07,w*0.024]];
      for(var q=0;q<2;q++){ var a=sk[q]; ctx.beginPath(); ctx.moveTo(a[0]-a[2],a[1]); ctx.lineTo(a[0]+a[2],a[1]); ctx.moveTo(a[0],a[1]-a[2]); ctx.lineTo(a[0],a[1]+a[2]); ctx.stroke(); }
    }

    ctx.restore();
  }

  function drawCandle(c){
    var x=c.x, y=c.y, cw=c.spec.width, cx=x+cw/2;
    var bodyTop=y+c.uw, bodyBot=bodyTop+c.bh;
    if(c.special){
      var blink=0.5+0.5*Math.sin(Date.now()/70), fill, outline, arrow;
      if(c.special==='limitup'){ fill='hsl(140,68%,'+(42+14*Math.sin(Date.now()/70))+'%)'; outline='rgba(190,255,200,'+(0.3+0.6*blink)+')'; arrow='↑'; }
      else { fill='hsl(2,85%,'+(52+14*Math.sin(Date.now()/70))+'%)'; outline='rgba(255,195,185,'+(0.3+0.6*blink)+')'; arrow='↓'; }
      ctx.strokeStyle=fill; ctx.lineWidth=Math.max(2,cw*0.12);
      ctx.beginPath(); ctx.moveTo(cx,y); ctx.lineTo(cx,bodyTop); ctx.moveTo(cx,bodyBot); ctx.lineTo(cx,bodyBot+c.lw); ctx.stroke();
      ctx.fillStyle=fill; roundRect(x,bodyTop,cw,Math.max(c.bh,3),4); ctx.fill();
      ctx.strokeStyle=outline; ctx.lineWidth=3.5; roundRect(x,bodyTop,cw,Math.max(c.bh,3),4); ctx.stroke();
      ctx.fillStyle='#fff'; ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.font='900 '+Math.max(16,Math.min(cw*0.48,c.bh*0.42))+'px sans-serif'; ctx.fillText(arrow, cx, bodyTop+c.bh*0.30);
      ctx.font='900 '+Math.max(10,Math.min(cw*0.30,c.bh*0.24))+'px sans-serif'; ctx.fillText('30%', cx, bodyTop+c.bh*0.72);
      ctx.textBaseline='alphabetic';
      return;
    }
    var col=c.isUp?UP_COLOR:DOWN_COLOR;
    ctx.strokeStyle=col; ctx.lineWidth=Math.max(2,cw*0.16);
    ctx.beginPath();
    ctx.moveTo(cx,y); ctx.lineTo(cx,bodyTop);
    ctx.moveTo(cx,bodyBot); ctx.lineTo(cx,bodyBot+c.lw);
    ctx.stroke();
    ctx.fillStyle=col;
    roundRect(x,bodyTop,cw,Math.max(c.bh,3),Math.min(5,cw*0.3)); ctx.fill();
  }
  function render(){
    ctx.clearRect(0,0,W,H);
    ctx.save();
    if(shake>0) ctx.translate((Math.random()-0.5)*shake,(Math.random()-0.5)*shake);
    ctx.strokeStyle='rgba(255,255,255,.03)'; ctx.lineWidth=1;
    for(var gy=80; gy<H; gy+=48){ ctx.beginPath(); ctx.moveTo(0,gy); ctx.lineTo(W,gy); ctx.stroke(); }
    for(var i=0;i<candles.length;i++){ if(candles[i].news) drawNews(candles[i]); else drawCandle(candles[i]); }
    if(state==='play' && player) drawPlayer();
    for(var f=0;f<floatTexts.length;f++){
      var ft=floatTexts[f];
      var sz = ft.base + (1-ft.life)*ft.base*0.45;
      ctx.globalAlpha=Math.max(0,Math.min(1,ft.life*1.4));
      ctx.fillStyle=ft.color; ctx.font='900 '+sz.toFixed(1)+'px sans-serif'; ctx.textAlign='center';
      ctx.lineWidth=3; ctx.strokeStyle='rgba(0,0,0,.55)';
      ctx.strokeText(ft.txt, ft.x, ft.y); ctx.fillText(ft.txt, ft.x, ft.y);
      ctx.globalAlpha=1;
    }
    if(bullTimer>0){
      var _p=0.5+0.5*Math.sin(Date.now()/140);
      ctx.fillStyle='rgba(63,185,80,'+(0.12+0.12*_p)+')'; ctx.fillRect(-40,-40,W+80,H+80);
      ctx.save();
      ctx.strokeStyle='rgba(126,231,135,'+(0.55+0.4*_p)+')';
      ctx.lineWidth=3+2*_p; ctx.shadowColor='#3fb950'; ctx.shadowBlur=22;
      ctx.strokeRect(4,4,W-8,H-8);
      ctx.restore();
      ctx.fillStyle='rgba(126,231,135,0.96)'; ctx.textAlign='center';
      ctx.font='900 30px sans-serif';
      ctx.shadowColor='#0d1117'; ctx.shadowBlur=8;
      ctx.fillText('🔥 불장 타임 '+bullTimer.toFixed(1)+'s 🔥', W/2, Math.round(H*0.5));
      ctx.shadowBlur=0;
    }
    if(newsTimer>0 && bullTimer<=0 && crashTimer<=0){
      var ncol = newsType==='boom' ? '63,185,80' : '248,81,73';
      var np2=0.5+0.5*Math.sin(Date.now()/150);
      ctx.strokeStyle='rgba('+ncol+','+(0.4+0.35*np2)+')'; ctx.lineWidth=4; ctx.strokeRect(4,4,W-8,H-8);
      ctx.fillStyle='rgba('+ncol+',0.95)'; ctx.textAlign='center'; ctx.font='900 20px sans-serif';
      ctx.fillText((newsType==='boom'?'🚀 떡상 뉴스 ':'💣 떡락 뉴스 ')+newsTimer.toFixed(1)+'s', W/2, 176);
    }
    if(crashTimer>0 && bullTimer<=0){
      var cp=0.5+0.5*Math.sin(Date.now()/120);
      ctx.fillStyle='rgba(200,40,40,'+(0.14+0.16*cp)+')'; ctx.fillRect(-40,-40,W+80,H+80);
      ctx.save();
      ctx.strokeStyle='rgba(255,90,80,'+(0.5+0.4*cp)+')'; ctx.lineWidth=4; ctx.shadowColor='#f85149'; ctx.shadowBlur=22;
      ctx.strokeRect(6,6,W-12,H-12); ctx.restore();
      ctx.fillStyle='rgba(255,120,110,0.96)'; ctx.textAlign='center'; ctx.font='900 30px sans-serif';
      ctx.shadowColor='#0d1117'; ctx.shadowBlur=8;
      ctx.fillText('📉 폭락장 '+crashTimer.toFixed(1)+'s 📉', W/2, Math.round(H*0.5)); ctx.shadowBlur=0;
    }
    if(flashR>0){ ctx.fillStyle='rgba(255,60,50,'+(flashR*0.5)+')'; ctx.fillRect(-40,-40,W+80,H+80); }
    if(flash>0){ ctx.fillStyle='rgba(120,255,140,'+(flash*0.5)+')'; ctx.fillRect(-40,-40,W+80,H+80); }
    ctx.restore();
  }

  function loop(ts){
    if(state!=='play'){ lastTS=ts; requestAnimationFrame(loop); return; }
    var dt=(ts-lastTS)/1000; lastTS=ts;
    if(!(dt>0)) dt=0.016;
    if(dt>0.05) dt=0.05;
    update(dt);
    if(state==='play'){
      render();
      var diff = money - displayMoney;
      if(Math.abs(diff) < 5000) displayMoney = money;
      else displayMoney += diff * Math.min(1, dt*9);
      if(moneyNumEl) moneyNumEl.textContent = fmtWon(displayMoney);
      document.getElementById('timeLabel').textContent = timeLeft.toFixed(1)+'s';
      document.getElementById('timebar').style.width = (timeLeft/GAME_TIME*100)+'%';
    }
    requestAnimationFrame(loop);
  }

  function roundRect(x,y,w,h,r){ r=Math.min(r,w/2,h/2); ctx.beginPath();
    ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r);
    ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath(); }
  function fmtWon(n){ return Math.round(n).toLocaleString('ko-KR'); }
  function fmtMan(n){
    if(n>=100000000) return (n/100000000).toFixed(n%100000000?1:0)+'억';
    return Math.round(n/10000).toLocaleString('ko-KR')+'만';
  }
  function addFloat(txt,x,y,color,level){
    floatTexts.push({txt:txt,x:x,y:y,color:color,life:1.1,base:12+(level||1)*0.9,vy:55+(level||1)*4});
  }
  function pulseMoney(dir, level){
    if(!moneyEl) return;
    var s = dir>0 ? (1.18 + (level||1)*0.02) : 0.86;
    moneyEl.style.transform = 'scale('+s+')';
    moneyEl.style.color = dir>0 ? '#3fb950' : '#f85149';
    clearTimeout(pulseTimer); clearTimeout(colorTimer);
    pulseTimer=setTimeout(function(){ moneyEl.style.transform='scale(1)'; },110);
    colorTimer=setTimeout(function(){ moneyEl.style.color='#e6edf3'; },350);
  }
  var comboTimer=null;
  function showCombo(n){
    var el=document.getElementById('combo');
    el.textContent = n+' 콤보!'; el.style.opacity=1;
    clearTimeout(comboTimer); comboTimer=setTimeout(function(){ el.style.opacity=0; },700);
  }
  function setEmo(t,d){ emo=t; emoTimer=d; }
  function showEvent(txt,color){
    if(!eventEl) return;
    eventEl.textContent=txt;
    eventEl.style.color = color || '';
    eventEl.style.textShadow = color ? ('0 0 20px '+color+', 0 3px 10px #000') : '';
    eventEl.classList.remove('show'); void eventEl.offsetWidth; eventEl.classList.add('show');
  }
  function bullMarket(){
    for(var i=0;i<candles.length;i++){
      var c=candles[i];
      if(c.dead) continue;
      c.isUp=true; c.special=null;   // 화면 안 모든 캔들 -> 초록 양봉
    }
    flash=1.3; bullTimer=5; shake=Math.max(shake,16);
    newsTimer=0; newsType=null; crashTimer=0;
    showEvent('🚀 가즈아! 🚀');
  }
  function spawnNews(){
    var nwd=Math.max(42,W*0.13), nhd=nwd*0.78;
    var x=Math.random()*(W-nwd-8)+4;
    candles.push({ news:true, kind:(Math.random()<0.5?'boom':'fake'), x:x, y:-nhd-12, w:nwd, h:nhd, speed:200+difficulty()*130, dead:false });
  }
  function spawnSpecialAt(type, yoff, huge){
    var isUp=(type==='limitup'), spec=candleSpec(10,isUp), uw=10, lw=10, bh=124;
    if(huge){ spec.width=Math.min(W-12, W*0.55); }
    else if(type==='limitup') spec.width=32;
    else { var LDW=[38,52,66,82,100]; spec.width=LDW[Math.floor(Math.random()*5)]; }
    var totalH=uw+bh+lw, x=Math.random()*(W-spec.width-8)+4;
    var speed=(235+difficulty()*190)*(0.9+Math.random()*0.3); if(type==='limitup') speed*=0.8;
    candles.push({ x:x, y:yoff-totalH, level:10, isUp:isUp, special:type, spec:spec, uw:uw, lw:lw, bh:bh, totalH:totalH, speed:speed, dead:false });
  }
  function triggerNews(kind){
    newsType = kind || (Math.random()<0.5 ? 'boom' : 'fake');
    newsTimer = 5; flash=0.8; shake=Math.max(shake,10);
    var st = newsType==='boom' ? 'limitup' : 'limitdown';
    var cnt = 1 + (Math.random()<0.5?1:0);
    for(var ni=0;ni<cnt;ni++) spawnSpecialAt(st, -20 - ni*320, true);
    showEvent(newsType==='boom' ? '🚀 떡상 뉴스!' : '💣 떡락 뉴스!', newsType==='boom' ? '#3fb950' : '#f85149');
    setEmo(newsType==='boom'?'wow':'shock', 1.0);
  }
  function startCrash(){
    crashTimer=5.5; flashR=1.2; shake=Math.max(shake,20);
    setEmo('shock',1.5);
    spawnSpecialAt('limitdown',-20); spawnSpecialAt('limitdown',-260);
    showEvent('📉 폭락장!', '#f85149');
  }
  function drawNews(c){
    var nw=c.w, nh=c.h, mx=c.x+nw/2, my=c.y+nh/2, t=Date.now();
    var aura='150,90,230', hdr='#1b1f27';
    ctx.save();
    ctx.translate(mx,my); ctx.rotate(Math.sin(t/300)*0.12);
    // 종류별 오라 (맥동) - 떡상 초록 / 떡락 빨강
    ctx.shadowColor='rgba('+aura+',0.95)'; ctx.shadowBlur=14+9*Math.sin(t/170);
    ctx.fillStyle='#ece7da'; roundRect(-nw/2,-nh/2,nw,nh,3); ctx.fill();
    ctx.shadowBlur=0;
    // 헤더 (종류색)
    ctx.fillStyle=hdr; roundRect(-nw/2+3,-nh/2+3,nw-6,nh*0.30,1); ctx.fill();
    ctx.fillStyle='#fff'; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.font='900 '+(nh*0.2)+'px sans-serif';
    ctx.fillText('NEWS', 0, -nh/2+nh*0.18);
    ctx.strokeStyle='rgba(60,60,70,.4)'; ctx.lineWidth=1;
    for(var li=0;li<3;li++){ var ly=-nh/2+nh*(0.52+li*0.16); ctx.beginPath(); ctx.moveTo(-nw/2+5,ly); ctx.lineTo(nw/2-5,ly); ctx.stroke(); }
    // 커다란 물음표 워터마크 (맥동, 종류색)
    ctx.fillStyle='rgba('+aura+','+(0.35+0.35*Math.sin(t/150))+')'; ctx.textBaseline='middle'; ctx.font='900 '+(nh*0.6)+'px serif';
    ctx.fillText('?', 0, nh*0.08);
    ctx.restore();
    // 떠다니는 작은 물음표
    ctx.save(); ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillStyle='rgba('+aura+','+(0.5+0.4*Math.sin(t/140))+')'; ctx.font='900 '+(nh*0.32)+'px serif';
    ctx.fillText('?', mx-nw*0.52, my-nh*0.42+Math.sin(t/200)*3);
    ctx.fillStyle='rgba('+aura+','+(0.5+0.4*Math.cos(t/160))+')'; ctx.font='900 '+(nh*0.26)+'px serif';
    ctx.fillText('?', mx+nw*0.56, my-nh*0.05+Math.cos(t/220)*3);
    ctx.restore();
  }
  function titleFor(m){
    if(m<=0)             return '🥫 깡통 개미';
    if(m>=15000000000)   return '🌌 은하계 투자왕';   // 150억+
    if(m>=8000000000)    return '🎩 워런 버핏 환생';   // 80억+
    if(m>=4300000000)    return '🌕 투 더 문';         // 43억+
    if(m>=2300000000)    return '🔥 불장의 지배자';     // 23억+
    if(m>=1200000000)    return '🖨️ 돈 복사기';        // 12억+
    if(m>=650000000)     return '🐂 황소 라이더';       // 6.5억+
    if(m>=350000000)     return '🕶️ 세력인가요?';       // 3.5억+
    if(m>=180000000)     return '💥 계좌 폭주';        // 1.8억+
    if(m>=95000000)      return '🚀 로켓 시동';        // 9500만+
    if(m>=50000000)      return '📈 슬슬 떡상';        // 5000만+
    if(m>=20000000)      return '🐜 개미';            // 2000만~5000만 (시작)
    if(m>=10000000)      return '🙏 존버 중';          // 1000만~2000만
    return '😱 물렸네 물렸어';                          // 0원 초과~1000만
  }
  function updateHUD(){
    if(moneyNumEl) moneyNumEl.textContent = fmtWon(displayMoney);
    document.getElementById('title-badge').textContent = titleFor(money);
  }

  function esc(t){ return String(t).replace(/[&<>"]/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c];}); }
  // ===== Supabase 공유 리더보드 설정 =====
  // 아래 두 값을 채우면 전세계 공유 랭킹으로 동작합니다. 비워두면 이 기기 로컬 저장으로 동작.
  //  설정법: supabase.com 프로젝트 생성 → 아래 SQL로 scores 테이블 생성 →
  //          Project Settings > API 에서 URL(Project URL)과 anon public key 복사해 붙여넣기
  //  SQL:
  //    create table scores ( id bigint generated always as identity primary key,
  //      name text, score bigint, combo int, created_at timestamptz default now() );
  //    alter table scores enable row level security;
  //    create policy "read"   on scores for select using (true);
  //    create policy "insert" on scores for insert with check (true);
  var SB_URL = 'https://igfitsqspovgcidmsrzm.supabase.co';
  var SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlnZml0c3FzcG92Z2NpZG1zcnptIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMwODM4MDUsImV4cCI6MjA5ODY1OTgwNX0.tJaWug0H87dF_XkErYs7VVnRhw2h5z0vqC7U-XtfFWE';
  var SB_ON  = !!(SB_URL && SB_KEY);
  function sbHeaders(){ return { 'apikey':SB_KEY, 'Authorization':'Bearer '+SB_KEY, 'Content-Type':'application/json' }; }

  var LB_KEY='ybmb_leaderboard_v1';
  function loadLB(){ try{ return JSON.parse(localStorage.getItem(LB_KEY))||[]; }catch(e){ return []; } }
  function saveScore(score){
    var lb=loadLB();
    lb.push({score:score, name:playerName, combo:maxCombo, hansang:hansangCount, date:Date.now()});
    lb.sort(function(a,b){ return b.score-a.score; });
    lb=lb.slice(0,20);
    try{ localStorage.setItem(LB_KEY, JSON.stringify(lb)); }catch(e){}
  }
  function renderRows(list, myScore, ulId, limit){
    var ul=document.getElementById(ulId||'lbList'); if(!ul) return; ul.innerHTML=''; limit=limit||10;
    if(!list || list.length===0){ ul.innerHTML='<li><span class="name" style="color:#9da7b3">아직 기록이 없어요</span></li>'; return; }
    var shownMe=false;
    for(var i=0;i<Math.min(limit,list.length);i++){
      var x=list[i], li=document.createElement('li');
      li.innerHTML='<span class="rank">'+(i+1)+'</span><span class="name">'+esc(x.name||'익명개미')+' <span style="opacity:.5;font-size:12px">'+titleFor(x.score)+'</span></span><span>'+fmtWon(x.score)+'원</span>';
      if(!shownMe && x.score===myScore){ li.className='me'; shownMe=true; }
      ul.appendChild(li);
    }
  }
  function renderLB(myScore){ renderRows(loadLB(), myScore, 'lbList', 10); }
  function showIntroLB(){ if(SB_ON) loadRemoteLB(-1,'lbListStart',5); else renderRows(loadLB(), -1, 'lbListStart', 5); }
  function submitRemote(name, score, combo, cb){
    fetch(SB_URL+'/rest/v1/scores', { method:'POST', headers:Object.assign({'Prefer':'return=minimal'}, sbHeaders()), body:JSON.stringify({name:name, score:score, combo:combo}) })
      .then(function(){ cb&&cb(); }).catch(function(){ cb&&cb(); });
  }
  function loadRemoteLB(myScore, ulId, limit){
    fetch(SB_URL+'/rest/v1/scores?select=name,score,combo&order=score.desc&limit=10', { headers:sbHeaders() })
      .then(function(r){ return r.json(); })
      .then(function(data){ renderRows(Array.isArray(data)?data:loadLB(), myScore, ulId, limit); })
      .catch(function(){ renderRows(loadLB(), myScore, ulId, limit); });
  }

  function startGame(){
    var v = (nameInput && nameInput.value) ? nameInput.value.trim() : '';
    if(v){ playerName = v.slice(0,10); try{ localStorage.setItem(NAME_KEY, playerName); }catch(e){} }
    if(!playerName) playerName = '익명개미';
    resetGame(); updateHUD();
    document.getElementById('startScreen').classList.add('hidden');
    document.getElementById('resultScreen').classList.add('hidden');
    document.getElementById('timebar').style.width='100%';
    state='play';
  }
  function endGame(){
    if(state==='over') return;
    state='over';
    saveScore(money);
    document.getElementById('resultHead').textContent = '장 마감!';
    document.getElementById('resultTitle').textContent = titleFor(money);
    document.getElementById('resultScore').textContent = fmtWon(money)+'원';
    document.getElementById('resultStats').textContent = '최고 '+maxCombo+' 콤보';
    if(SB_ON){
      document.getElementById('lbList').innerHTML='<li><span class="name" style="color:#9da7b3">랭킹 불러오는 중...</span></li>';
      var fs=money, fn=playerName;
      submitRemote(fn, fs, maxCombo, function(){ loadRemoteLB(fs); });
    } else {
      renderLB(money);
    }
    document.getElementById('resultScreen').classList.remove('hidden');
  }

  moneyEl=document.getElementById('money');
  moneyNumEl=document.getElementById('moneyNum');
  nameInput=document.getElementById('nameInput');
  eventEl=document.getElementById('eventBanner');
  showIntroLB();
  try{ var sv=localStorage.getItem(NAME_KEY); if(sv && nameInput) nameInput.value=sv; }catch(e){}
  if(nameInput) nameInput.addEventListener('keydown', function(e){ if(e.key==='Enter') startGame(); });
  document.getElementById('startBtn').addEventListener('click', startGame);
  document.getElementById('retryBtn').addEventListener('click', startGame);

  resize();
  requestAnimationFrame(loop);
})();
</script>
